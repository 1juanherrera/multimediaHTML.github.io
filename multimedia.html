<!DOCTYPE html>
<html>
    <head>
        <title>Multimedia HTML</title>
    </head>
    <body>
        <div>
          <h1>Aprendiendo a utilizar imagenes</h1>
          <img src="warzone.jpg" alt="imagen.jpg" width="300">
        </div>

        <div>
            <h1>Aprendiendo a utilizar los videos</h1>
            <video width="300" controls muted loop autoplay>
            <source src="10 segundos.mp4" type="video/mp4"/>

            </video>
        </div>
        <div>
            <h1>Aprendiendo a utlizar audios</h1>
            <audio controls loop autoplay>
            <source src="Feid - Normal.mp3" type="audio/mp3"/>

            </audio>
        </div>
    </body>
</html>
